<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Allerion — Badges &amp; Pills</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{--accent:#5a6850;--accent-d:#424d39;--accent-l:#eef1e7;--gold:#c19a3e;--line:#d7dacd;--muted:#6a7062}
  *{box-sizing:border-box;margin:0}body{font-family:Inter,sans-serif;background:#fbfbf8;color:#181b12;padding:40px}
  h1{font-size:1rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:24px}
  .row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:18px}
  .lbl{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);width:110px}
  .eyebrow{font-size:.76rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);display:inline-flex;align-items:center;gap:.5rem}
  .eyebrow::before{content:'';width:18px;height:1.5px;background:var(--accent);opacity:.6}
  .pill{font-size:.8rem;font-weight:600;color:#3b4034;background:#fff;border:1px solid var(--line);padding:.4rem .85rem;border-radius:999px;display:inline-flex;align-items:center;gap:.45rem;box-shadow:0 1px 2px rgba(24,27,18,.05)}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(90,104,80,.18)}
  .price-pill{font-size:.8rem;font-weight:600;color:var(--accent-d);background:var(--accent-l);padding:.35rem .8rem;border-radius:999px}
  .tag{display:inline-flex;align-items:center;gap:.5rem;font-size:.85rem;font-weight:600;color:var(--accent-d);background:#fff;border:1px solid var(--line);padding:.45rem 1rem;border-radius:999px}
  .badge-gold{font-size:.72rem;font-weight:700;letter-spacing:.04em;background:var(--accent);color:#fff;padding:.25rem .8rem;border-radius:999px}
</style></head><body>
  <h1>Badges &amp; Pills</h1>
  <div class="row"><span class="lbl">eyebrow</span><span class="eyebrow">Built for the trades</span></div>
  <div class="row"><span class="lbl">pill</span><span class="pill"><span class="dot"></span> Founder-built</span><span class="pill">You own everything</span><span class="pill">No long contracts</span></div>
  <div class="row"><span class="lbl">price-pill</span><span class="price-pill">14-day free trial</span></div>
  <div class="row"><span class="lbl">tag</span><span class="tag">📞 For roofing &amp; home-service contractors</span></div>
  <div class="row"><span class="lbl">badge</span><span class="badge-gold">Most popular</span></div>
</body></html>
