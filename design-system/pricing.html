<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Allerion — Pricing Plans</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{--accent:#5a6850;--accent-d:#424d39;--line:#e6e8df;--line2:#d7dacd;--muted:#6a7062;--ink2:#3b4034;--sh:0 1px 2px rgba(24,27,18,.04),0 2px 8px rgba(24,27,18,.05);--sh2:0 4px 12px rgba(24,27,18,.06),0 16px 40px rgba(24,27,18,.07)}
  *{box-sizing:border-box;margin:0}body{font-family:Inter,sans-serif;background:#fbfbf8;color:#181b12;padding:40px}
  h1{font-size:1rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:28px}
  .pricing{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:620px;align-items:stretch}
  .plan{background:#fff;border:1px solid var(--line);border-radius:18px;padding:1.8rem;display:flex;flex-direction:column;box-shadow:var(--sh)}
  .plan.feat{border:2px solid var(--accent);box-shadow:var(--sh2);position:relative}
  .plan.feat::before{content:'Most popular';position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:.72rem;font-weight:700;padding:.25rem .8rem;border-radius:999px}
  .plan h3{font-size:1.1rem}
  .plan .p{font-family:'Fraunces',serif;font-size:2.4rem;font-weight:600;margin:.3rem 0}
  .plan .p span{font-size:1rem;color:var(--muted);font-family:Inter;font-weight:500}
  .plan ul{list-style:none;margin:.9rem 0 1.3rem;display:grid;gap:.5rem}
  .plan li{font-size:.92rem;color:var(--ink2);display:flex;gap:.5rem}.plan li::before{content:'✓';color:var(--accent);font-weight:800}
  .btn{margin-top:auto;width:100%;border:none;border-radius:999px;padding:.85rem;font-weight:700;font-size:1rem;cursor:pointer}
  .btn-p{background:var(--accent);color:#fff}.btn-g{background:#fff;color:#181b12;border:1.5px solid var(--line2)}
</style></head><body>
  <h1>Pricing Plans</h1>
  <div class="pricing">
    <div class="plan"><h3>Solo</h3><div class="p">$97<span>/mo</span></div>
      <ul><li>One business number</li><li>Missed-call text-back</li><li>Auto-qualify + book</li><li>Cancel anytime</li></ul>
      <button class="btn btn-g">Start free trial</button></div>
    <div class="plan feat"><h3>Crew</h3><div class="p">$197<span>/mo</span></div>
      <ul><li>Everything in Solo</li><li>Web + Facebook/Angi leads</li><li>Spanish + English</li><li>Priority setup</li></ul>
      <button class="btn btn-p">Start free trial</button></div>
  </div>
</body></html>
