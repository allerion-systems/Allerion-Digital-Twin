<!-- @dsCard group="Components" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Allerion — Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{--accent:#5a6850;--accent-d:#424d39;--accent-l:#eef1e7;--gold:#c19a3e;--line:#e6e8df;--muted:#6a7062;--ink-dark:#14180f;--r:16px;--sh:0 1px 2px rgba(24,27,18,.04),0 2px 8px rgba(24,27,18,.05)}
  *{box-sizing:border-box;margin:0}body{font-family:Inter,sans-serif;background:#fbfbf8;color:#181b12;padding:40px}
  h1{font-size:1rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:24px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:840px}
  .step,.feature{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:1.6rem;box-shadow:var(--sh)}
  .step .n{width:36px;height:36px;border-radius:11px;background:var(--accent-l);color:var(--accent-d);font-weight:800;display:grid;place-items:center;margin-bottom:.8rem}
  .step h3,.feature h3{font-size:1.1rem;margin-bottom:.3rem}
  .step p,.feature p{color:var(--muted);font-size:.92rem}
  .price{display:inline-block;margin-top:.9rem;font-weight:700;color:var(--accent-d);font-size:.84rem;background:var(--accent-l);padding:.3rem .75rem;border-radius:999px}
  .feature .ico{width:44px;height:44px;border-radius:12px;background:var(--accent-l);display:grid;place-items:center;font-size:1.25rem;margin-bottom:.8rem}
  .stat{background:var(--ink-dark);color:#fff;border-radius:var(--r);padding:1.6rem;text-align:center}
  .stat .num{font-family:'Fraunces',serif;font-weight:600;font-size:2.4rem}.stat .num .u{color:var(--gold)}
  .stat .l{color:#b9bfae;font-size:.85rem;margin-top:.3rem}
  .sec{font-size:.8rem;color:var(--muted);margin:26px 0 10px;font-weight:600}
</style></head><body>
  <h1>Cards</h1>
  <div class="sec">Step card · Feature card · Stat card</div>
  <div class="grid">
    <div class="step"><div class="n">1</div><h3>Diagnose</h3><p>We map exactly where your business leaks money and hours.</p><span class="price">$1,500 · credited</span></div>
    <div class="feature"><div class="ico">📞</div><h3>Missed-call text-back</h3><p>The second a call goes unanswered, the customer gets a friendly text that books the job.</p></div>
    <div class="stat"><div class="num">21<span class="u">×</span></div><div class="l">more likely to win if you reply in &lt;5 min</div></div>
  </div>
</body></html>
