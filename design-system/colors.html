<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Allerion — Color Tokens</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing:border-box; margin:0; }
  body { font-family:Inter,sans-serif; background:#fbfbf8; color:#181b12; padding:40px; }
  h1 { font-size:1rem; letter-spacing:.12em; text-transform:uppercase; color:#5a6850; margin-bottom:24px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:16px; }
  .sw { border:1px solid #e6e8df; border-radius:14px; overflow:hidden; }
  .chip { height:84px; }
  .meta { padding:10px 12px; }
  .name { font-weight:700; font-size:.86rem; }
  .hex { font-family:"JetBrains Mono",monospace; font-size:.78rem; color:#6a7062; }
</style>
</head>
<body>
  <h1>Color Tokens</h1>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#5a6850"></div><div class="meta"><div class="name">accent / olive</div><div class="hex">#5A6850</div></div></div>
    <div class="sw"><div class="chip" style="background:#424d39"></div><div class="meta"><div class="name">accent deep</div><div class="hex">#424D39</div></div></div>
    <div class="sw"><div class="chip" style="background:#eef1e7"></div><div class="meta"><div class="name">accent light</div><div class="hex">#EEF1E7</div></div></div>
    <div class="sw"><div class="chip" style="background:#9da2a6"></div><div class="meta"><div class="name">silver</div><div class="hex">#9DA2A6</div></div></div>
    <div class="sw"><div class="chip" style="background:#c19a3e"></div><div class="meta"><div class="name">gold</div><div class="hex">#C19A3E</div></div></div>
    <div class="sw"><div class="chip" style="background:#f3ead2"></div><div class="meta"><div class="name">gold light</div><div class="hex">#F3EAD2</div></div></div>
    <div class="sw"><div class="chip" style="background:#14180f"></div><div class="meta"><div class="name">ink / bg-dark</div><div class="hex">#14180F</div></div></div>
    <div class="sw"><div class="chip" style="background:#181b12"></div><div class="meta"><div class="name">ink body</div><div class="hex">#181B12</div></div></div>
    <div class="sw"><div class="chip" style="background:#6a7062"></div><div class="meta"><div class="name">muted</div><div class="hex">#6A7062</div></div></div>
    <div class="sw"><div class="chip" style="background:#fbfbf8;border-right:1px solid #e6e8df"></div><div class="meta"><div class="name">paper / bg</div><div class="hex">#FBFBF8</div></div></div>
    <div class="sw"><div class="chip" style="background:#f3f4ee"></div><div class="meta"><div class="name">surface soft</div><div class="hex">#F3F4EE</div></div></div>
    <div class="sw"><div class="chip" style="background:#e6e8df"></div><div class="meta"><div class="name">line</div><div class="hex">#E6E8DF</div></div></div>
  </div>
</body>
</html>
